<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Agent Spend Guard">
  <title>Agent Spend Guard</title>
  <desc>Mint-green hexagonal shield with an interrupted circular loop inside. The loop is cut at the right side, marked by a solid dot; the open end at the top-left carries an arrowhead showing the loop's original direction of motion.</desc>
  <!--
    Geometry notes:
      viewBox 64×64, all coords integer-friendly so the mark snaps cleanly at small sizes.
      Stroke 2.6 with linecap=round; thicker would clog at 16px favicon, thinner would disappear.
      Shield: flat top, two short upper diagonals, two long sides, two long lower diagonals meeting at a point.
      Loop: ~270° counter-clockwise arc, gap on the right side (~3 o'clock).
      Arrowhead: small triangle at the top-left terminus of the arc.
      Dot: at the other terminus, marking the cut.
  -->
  <g fill="none" stroke="#6ee7b7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hex shield outline -->
    <path d="M 22 8 L 42 8 L 54 18 L 54 36 L 32 58 L 10 36 L 10 18 Z" />
    <!-- Broken loop: from bottom-right of gap, counter-clockwise around to top-left where arrow is -->
    <path d="M 44 36 A 12 12 0 1 0 38 22" />
  </g>
  <!-- Solid mint elements (no stroke) -->
  <polygon points="38,22 31,21 34,28" fill="#6ee7b7" />
  <circle cx="44" cy="36" r="2.4" fill="#6ee7b7" />
</svg>
