<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AIBrake">
  <!--
    AIBrake favicon — blue gradient "a" monogram on dark rounded square.
    Matches the v3 brand palette (var(--accent-deep) → var(--accent-bright)).
  -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0099ff"/>
      <stop offset="0.55" stop-color="#1ec1f0"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>
  <text x="32" y="46"
        text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Inter, sans-serif"
        font-size="44"
        font-weight="800"
        letter-spacing="-2"
        fill="url(#g)">a</text>
</svg>
