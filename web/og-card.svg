<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!--
    OpenGraph / Twitter share card. 1200x630 canonical OG aspect.
    Dark navy canvas, blue-gradient mark on the left, wordmark + tagline on
    the right. Bottom strip shows the 100-partner / 7-day benchmark numbers.

    Note: most social crawlers do NOT render SVG as og:image.
    Convert this file to og-card.png before going live (see
    scripts/render-og-card.mjs).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1424"/>
    </linearGradient>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1ec1f0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1ec1f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0099ff"/>
      <stop offset="0.55" stop-color="#1ec1f0"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0099ff"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="600" height="630" fill="url(#accent-fade)"/>

  <!-- Subtle grid overlay (low opacity, just for texture) -->
  <g stroke="#1ec1f0" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Subtle 1px frame -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#1c2030" stroke-width="1"/>

  <!-- Status pill, top-left -->
  <g transform="translate(72 70)">
    <rect width="240" height="36" rx="18" fill="rgba(30,193,240,0.08)" stroke="#1f3d52" stroke-width="1"/>
    <circle cx="20" cy="18" r="4" fill="#1ec1f0"/>
    <text x="36" y="23" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" fill="#1ec1f0" letter-spacing="0.5">v0.5.5-beta · hosted beta</text>
  </g>

  <!-- "ab" monogram mark — typographic, in dark rounded square.
       Mirrors the favicon.png design (which is also "ab" on dark rounded square). -->
  <g transform="translate(130 200)" filter="url(#glow)">
    <rect width="240" height="240" rx="40" fill="#0a0e1a" stroke="rgba(30,193,240,0.2)" stroke-width="1"/>
    <text x="120" y="180"
          text-anchor="middle"
          font-family="-apple-system, 'Segoe UI', Inter, sans-serif"
          font-size="180"
          font-weight="800"
          letter-spacing="-8"
          fill="url(#mark-grad)">ab</text>
  </g>

  <!-- Wordmark + tagline, right side -->
  <g transform="translate(490 220)" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
    <text x="0" y="0" font-size="86" font-weight="800" letter-spacing="-2.5" fill="url(#brand-grad)">AIBrake</text>
    <text x="0" y="68" font-size="32" font-weight="500" fill="#c4cad4" letter-spacing="-0.3">Loop detection and model</text>
    <text x="0" y="110" font-size="32" font-weight="500" fill="#c4cad4" letter-spacing="-0.3">stop-loss for paid AI agents.</text>

    <!-- Positioning line -->
    <text x="0" y="186" font-size="22" font-weight="600" fill="#1ec1f0" letter-spacing="-0.2">PQS checks the prompt.</text>
    <text x="0" y="218" font-size="22" font-weight="600" fill="#1ec1f0" letter-spacing="-0.2">AIBrake checks the loop.</text>
  </g>

  <!-- Stats strip, bottom -->
  <g transform="translate(72 540)" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#7a8294" letter-spacing="0.6">BENCHMARK · 100 partners · 7 simulated workdays</text>
    <g transform="translate(0 26)" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
      <text x="0" y="0" font-size="28" font-weight="700" fill="#1ec1f0">$6,883</text>
      <text x="120" y="0" font-size="14" font-weight="500" fill="#98a0ad">savings offered</text>

      <text x="285" y="0" font-size="28" font-weight="700" fill="#e7e9ee">73,765</text>
      <text x="395" y="0" font-size="14" font-weight="500" fill="#98a0ad">checks served</text>

      <text x="540" y="0" font-size="28" font-weight="700" fill="#e7e9ee">~5ms</text>
      <text x="625" y="0" font-size="14" font-weight="500" fill="#98a0ad">median latency</text>

      <text x="770" y="0" font-size="28" font-weight="700" fill="#e7e9ee">17,978</text>
      <text x="870" y="0" font-size="14" font-weight="500" fill="#98a0ad">catches with $-value</text>
    </g>
  </g>

  <!-- Domain footer, bottom-right -->
  <g transform="translate(1056 580)" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" text-anchor="end">
    <text x="72" y="0" font-size="16" font-weight="600" fill="#1ec1f0" letter-spacing="0.5">aibrake.dev</text>
  </g>
</svg>
