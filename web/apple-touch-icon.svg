<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="AIBrake">
  <!--
    AIBrake apple-touch-icon, 180×180.
    Blue gradient "a" monogram on dark rounded square — matches favicon
    and v3 brand palette. iOS mask rounds the corners further on its own.
  -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0099ff"/>
      <stop offset="0.55" stop-color="#1ec1f0"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="#0a0e1a"/>
  <text x="90" y="128"
        text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Inter, sans-serif"
        font-size="120"
        font-weight="800"
        letter-spacing="-5"
        fill="url(#g)">a</text>
</svg>
